<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 离线文本标注复核工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f0f2f5;
            color: #1f2937;
            line-height: 1.6;
        }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 400px;
        }
        .login-box h1 { text-align: center; margin-bottom: 8px; color: #111827; font-size: 24px; }
        .login-box .subtitle { text-align: center; color: #6b7280; margin-bottom: 28px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151; }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-control:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .btn {
            display: inline-block;
            padding: 10px 16px;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn-primary { background: #3b82f6; color: white; width: 100%; margin-top: 8px; padding: 12px; font-size: 15px; }
        .btn-primary:hover { background: #2563eb; }
        .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .flash-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .flash-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .flash-warning { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <h1>📝 标注复核工具</h1>
            <p class="subtitle">完全离线运行 · 本地数据存储</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endwith %}
            <form method="post">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid #e5e7eb; font-size: 13px; color: #6b7280;">
                <p style="font-weight: 600; margin-bottom: 8px; color: #374151;">默认测试账号：</p>
                <p>管理员：admin / admin123</p>
                <p>标注员：annotator1 / anno123</p>
                <p>复核员：reviewer1 / review123</p>
            </div>
        </div>
    </div>
</body>
</html>
