{% extends "base.html" %}
{% block title %}{% if user %}编辑用户{% else %}新增用户{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{% if user %}编辑用户{% else %}新增用户{% endif %}</h1>
    <a href="{{ url_for('users') }}" class="btn btn-outline">← 返回列表</a>
</div>

<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="form-group">
            <label>用户名 *</label>
            <input type="text" name="username" class="form-control"
                   {% if user %}value="{{ user.username }}" disabled{% else %}required{% endif %}>
            {% if user %}<small class="text-muted">用户名不可修改</small>{% endif %}
        </div>
        <div class="form-group">
            <label>显示名</label>
            <input type="text" name="display_name" class="form-control"
                   value="{{ user.display_name if user else '' }}" placeholder="用于界面显示的名称">
        </div>
        <div class="form-group">
            <label>角色 *</label>
            <select name="role" class="form-control" required>
                <option value="annotator" {% if user and user.role == 'annotator' %}selected{% endif %}>标注员</option>
                <option value="reviewer" {% if user and user.role == 'reviewer' %}selected{% endif %}>复核员</option>
                <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>管理员</option>
            </select>
        </div>
        <div class="form-group">
            <label>密码{% if user %}（留空则不修改）{% else %} *{% endif %}</label>
            <input type="password" name="password" class="form-control" {% if not user %}required{% endif %}>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary">{% if user %}保存修改{% else %}创建用户{% endif %}</button>
            <a href="{{ url_for('users') }}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
